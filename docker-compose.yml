services:
  vibesync:
    build: .
    container_name: vibesync-app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - NODE_ENV=development
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.51 # Updated with host IP from ipconfig
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    stdin_open: true # Allows interactive mode
    tty: true
    networks:
      - vibesync-network

networks:
  vibesync-network:
    driver: bridge

version: '3.8'

services:
  vibesync:
    build: .
    container_name: vibesync-app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - NODE_ENV=development
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - vibesync-network

networks:
  vibesync-network:
    driver: bridge
